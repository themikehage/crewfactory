services:
  crewfactory:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    init: true
    expose:
      - "3000"
      - "3001"
    environment:
      - SERVICE_FQDN_CREWFACTORY_3000
      - JWT_SECRET=${JWT_SECRET:?Must set JWT_SECRET (openssl rand -base64 32)}
      - AUTH_USERNAME=${AUTH_USERNAME:?Must set AUTH_USERNAME}
      - AUTH_PASSWORD_HASH=${AUTH_PASSWORD_HASH:?Must set AUTH_PASSWORD_HASH}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - CREWFACTORY_DATA_PATH=/app/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 3s
      start_period: 10s
      retries: 3
    volumes:
      - crewfactory-data:/app/data
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M

volumes:
  crewfactory-data:
